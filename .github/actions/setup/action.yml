name: Setup Deno and Node
description: Install the runtimes and locked project dependencies
runs:
  using: composite
  steps:
    - uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x
        cache: true

    - uses: actions/setup-node@v6
      with:
        node-version: 22
        package-manager-cache: false

    - name: Install locked dependencies
      run: deno install --frozen
      shell: bash
