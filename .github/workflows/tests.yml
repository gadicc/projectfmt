name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Checks and artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Codecov OIDC
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/setup
      - name: Format, lint, typecheck, and test with coverage
        run: deno task check:ci
      - name: Validate JSR and npm artifacts
        run: deno task test:packages
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage.lcov
          use_oidc: true

  npm-smoke:
    name: npm smoke (Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      matrix:
        # Audited 2026-07-22 against https://nodejs.org/en/about/previous-releases
        node-version: [22, 24, 26]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}
      - run: deno task build:npm
      - run: deno task test:npm

  platforms:
    name: Runtime smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/setup
      - run: deno task check
        shell: bash
