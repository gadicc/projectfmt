name: Release

on:
  push:
    branches: [main, next, next-major, beta, alpha]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
    permissions:
      contents: read
      id-token: write

  release:
    name: Release if relevant
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write # npm and JSR trusted publishing with provenance
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Install npm version with trusted publishing support
        run: npm install --global npm@11.18.0

      - name: Build npm artifact
        run: deno task build:npm

      - name: Install Node release dependencies
        run: deno install --frozen --node-modules-dir=auto

      - name: Supply semantic-release-jsr package metadata
        run: echo '{"version":"0.0.1"}' > package.json

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: deno task release
